<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="NyctoType の紹介ページ。Steamページ、更新情報、関連リンクを掲載しています。"

    <meta property="og:image" content="../assets/games/NyctoType/LibraryCapsule.png" />

    <link rel="apple-touch-icon" href="../apple-touch-icon.png" />

    <title>NyctoType | BogosorStudio</title>
    <link rel="stylesheet" href="./game-page.css" />

    <style>
      :root {
        --hero-art: url("../assets/games/NyctoType/LibraryHero.png");
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar-inner">
        <div class="brand-cluster">
          <a class="brand" href="../index.html">BogosorStudio</a>
          <button class="lang-toggle" type="button" aria-label="日本語と英語を切り替え">
            <span class="lang-option is-active" data-lang-option="ja">JP</span>
            <span>/</span>
            <span class="lang-option" data-lang-option="en">EN</span>
          </button>
        </div>
        <nav class="top-links" aria-label="ページリンク">
          <a class="button" href="../index.html#games" data-ja="タイトル一覧" data-en="Titles">
            タイトル一覧
          </a>
          <a
            class="button button-primary"
            href="https://store.steampowered.com/search/?term=NyctoType"
          >
            Steam
          </a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <span class="hero-art" aria-hidden="true"></span>
        <div class="wrap hero-grid">
          <h1>NyctoType</h1>
          <p class="summary" data-ja="NyctoTypeの公開情報、ストアリンク、関連リンクをこのページにまとめます。" data-en="Release information store links and related links for NyctoType are collected here.">
            NyctoTypeの公開情報、ストアリンク、関連リンクをこのページにまとめます。
          </p>
          <div class="status-row">
            <span class="label" data-ja="リリース予定: 未定" data-en="Release: TBA">リリース予定: 未定</span>
            <span class="label label-muted" data-ja="Steamページ準備中" data-en="Steam page in preparation">Steamページ準備中</span>
          </div>
          <div class="action-row">
            <a
              class="button button-primary"
              href="https://store.steampowered.com/search/?term=NyctoType"
            >
              Steam
            </a>
          </div>
        </div>
      </section>

      <section class="text-band">
        <div class="wrap text-blocks">
          <article class="text-block">
            <h2 data-ja="概要" data-en="Overview">概要</h2>
            <p data-ja="NyctoTypeの概要やルール説明は、Steamページ公開後に差し替えます。" data-en="Details and rule explanations for NyctoType can be replaced after the Steam page is published.">NyctoTypeの概要やルール説明は、Steamページ公開後に差し替えます。</p>
          </article>
          <article class="text-block">
            <h2 data-ja="更新" data-en="Updates">更新</h2>
            <p data-ja="リリース時期、ストアリンク、イベント展示などの情報をここに追加できます。" data-en="Release timing store links event appearances and other notes can be added here.">リリース時期、ストアリンク、イベント展示などの情報をここに追加できます。</p>
          </article>
        </div>
      </section>

      <section class="link-panel">
        <div class="wrap">
          <div class="link-box">
            <div>
              <h2>Links</h2>
              <p data-ja="ストアページ、更新情報、問い合わせ先などを必要に応じて追加できます。" data-en="Store pages updates contact links and other references can be added here.">ストアページ、更新情報、問い合わせ先などを必要に応じて追加できます。</p>
              <div class="meta-row" aria-label="基本情報">
                <span><b>Platform</b> Steam</span>
                <span><b>Status</b> 準備中</span>
                <span><b>Links</b> Steam / X</span>
              </div>
            </div>
            <div class="action-row">
              <a
                class="button button-primary"
                href="https://store.steampowered.com/search/?term=NyctoType"
              >
                Steam
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const languageKey = "bogosorstudio-language";
      const langToggle = document.querySelector(".lang-toggle");
      const langOptions = [...document.querySelectorAll("[data-lang-option]")];
      const translatable = [...document.querySelectorAll("[data-ja][data-en]")];

      const setLanguage = (language) => {
        const nextLanguage = language === "en" ? "en" : "ja";
        document.documentElement.lang = nextLanguage;
        translatable.forEach((node) => {
          node.textContent = node.dataset[nextLanguage];
        });
        langOptions.forEach((option) => {
          option.classList.toggle("is-active", option.dataset.langOption === nextLanguage);
        });
        localStorage.setItem(languageKey, nextLanguage);
      };

      langToggle?.addEventListener("click", () => {
        const currentLanguage = document.documentElement.lang === "en" ? "en" : "ja";
        setLanguage(currentLanguage === "en" ? "ja" : "en");
      });

      setLanguage(localStorage.getItem(languageKey) || "ja");
    </script>
  </body>
</html>
