<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="BogosorStudioの展示・試遊・イベント出展情報をまとめたページです。"
    />
    <meta property="og:title" content="展示情報 | BogosorStudio" />
    <meta
      property="og:description"
      content="BogosorStudioの展示・試遊・イベント出展情報をまとめたページです。"
    />
    <meta property="og:type" content="website" />
    <title>展示情報 | BogosorStudio</title>
    <link rel="stylesheet" href="../News/news.css" />
    <style>
      .schedule {
        display: grid;
        gap: 1px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--line);
      }

      .schedule-card {
        display: grid;
        grid-template-columns: 180px 1fr auto;
        gap: 28px;
        align-items: start;
        padding: 28px;
        background: rgba(23, 23, 19, 0.84);
      }

      .schedule-date {
        color: var(--gold);
        font-size: 1.02rem;
        font-weight: 850;
        line-height: 1.35;
      }

      .schedule-date span {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .schedule-card h2 {
        margin: 0 0 8px;
        font-size: clamp(1.35rem, 3vw, 2rem);
        line-height: 1.14;
      }

      .schedule-card p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .schedule-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        color: #d7d0c1;
        background: rgba(244, 240, 231, 0.06);
        font-size: 0.8rem;
        font-weight: 760;
      }

      .status-pill {
        border-color: rgba(212, 168, 48, 0.5);
        color: #17120a;
        background: linear-gradient(135deg, #f3d36e, var(--gold));
      }

      .note-band {
        margin-top: 34px;
        border: 1px solid rgba(212, 168, 48, 0.3);
        border-radius: var(--radius);
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(212, 168, 48, 0.12), rgba(123, 215, 184, 0.08)),
          var(--panel);
      }

      .note-band p {
        margin-bottom: 0;
        color: #d7d0c1;
      }

      @media (max-width: 860px) {
        .schedule-card {
          grid-template-columns: 1fr;
          gap: 14px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap nav">
        <a class="brand" href="../index.html" aria-label="BogosorStudio Home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">BogosorStudio</span>
        </a>
        <nav class="nav-links" aria-label="メインナビゲーション">
          <a class="nav-link" href="../index.html#games">ゲーム一覧</a>
          <a class="nav-link" href="../News/index.html">News</a>
          <a class="nav-link" href="./index.html">展示情報</a>
          <a class="nav-link" href="../index.html#contact">Contact</a>
          <a class="button" href="https://store.steampowered.com/search/?developer=BogosorStudio">
            Steam
          </a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero wrap">
        <p class="eyebrow">Events</p>
        <h1>展示情報</h1>
        <p class="lead">
          BogosorStudioの展示、試遊、イベント出展情報をまとめます。
        </p>
      </section>

      <section class="wrap" aria-label="展示情報一覧">
        <div class="schedule">
          <article class="schedule-card">
            <div class="schedule-date">
              未定
              <span>Schedule TBA</span>
            </div>
            <div>
              <h2>次回展示は準備中です</h2>
              <p>
                出展予定、試遊可能タイトル、会場情報が決まり次第ここに掲載します。
              </p>
              <div class="schedule-meta" aria-label="展示メタ情報">
                <span class="pill status-pill">準備中</span>
                <span class="pill">展示</span>
                <span class="pill">試遊</span>
              </div>
            </div>
            <a class="text-link" href="https://x.com/BogosorGames">Xを見る</a>
          </article>
        </div>

        <div class="note-band">
          <p>
            イベント情報はNewsにも掲載します。最新の短い告知はXで更新する予定です。
          </p>
          <div class="link-row">
            <a class="text-link" href="../News/index.html">News一覧へ</a>
            <a class="text-link" href="https://x.com/BogosorGames">Xを見る</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="wrap">© 2026 BogosorStudio</div>
    </footer>
  </body>
</html>
